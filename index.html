<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻豆导航 - 备用链接</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12">
                <h1 class="text-4xl sm:text-5xl font-bold text-gray-900 mb-4">ModelMedia</h1>
                <p class="text-xl text-gray-600">官方备用链接集合</p>
                <p class="text-sm text-gray-500 mt-2" id="utmInfo"></p>
            </div>

            <!-- Links Container -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Link Card 1 -->
                <a href="https://daohang.modelmedia.asia" class="backup-link group">
                    <div class="bg-white rounded-lg shadow-md hover:shadow-xl hover:scale-105 transition-all duration-300 p-6 h-full">
                        <div class="flex items-center mb-4">
                            <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex items-center justify-center">
                                <span class="text-white text-lg font-bold">M</span>
                            </div>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors">永久官方网站</h3>
                        <p class="text-gray-600 text-sm">访问 麻豆导航</p>
                        <p class="text-blue-500 text-xs mt-3 truncate">https://daohang.modelmedia.asia/</p>
                    </div>
                </a>


            </div>

        </div>
    </div>

    <script>
        // 获取 URL 中的 UTM 参数
        function getUTMParams() {
            const params = new URLSearchParams(window.location.search);
            const utmParams = {};
            
            // 获取所有 utm_ 开头的参数
            for (let [key, value] of params) {
                if (key.startsWith('utm_') || key === 'utm') {
                    utmParams[key] = value;
                }
            }
            
            return utmParams;
        }

        // 将 UTM 参数附加到 URL
        function appendUTMToUrl(url, utmParams) {
            if (Object.keys(utmParams).length === 0) return url;
            
            const urlObj = new URL(url);
            
            // 添加所有 UTM 参数
            for (let [key, value] of Object.entries(utmParams)) {
                // 将 utm=xxx 转换为 utm_source=xxx
                if (key === 'utm') {
                    urlObj.searchParams.set('utm_source', value);
                } else {
                    urlObj.searchParams.set(key, value);
                }
            }
            
            return urlObj.toString();
        }

        // 初始化：处理所有链接
        function initializeUTMTracking() {
            const utmParams = getUTMParams();
            
            // 显示当前 UTM 信息
            const utmInfo = document.getElementById('utmInfo');
            if (Object.keys(utmParams).length > 0) {
                const utmString = Object.entries(utmParams)
                    .map(([key, value]) => `${key}=${value}`)
                    .join('&');
                //utmInfo.textContent = `✓ 已检测到 UTM 参数: ${utmString}`;
                utmInfo.classList.add('text-green-600', 'font-semibold');
            }
            
            // 修改所有备用链接
            const links = document.querySelectorAll('a.backup-link');
            links.forEach(link => {
                const originalUrl = link.getAttribute('href');
                const newUrl = appendUTMToUrl(originalUrl, utmParams);
                link.setAttribute('href', newUrl);
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initializeUTMTracking);
    </script>
</body>
</html>
